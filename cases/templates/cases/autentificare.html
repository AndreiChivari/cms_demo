<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Autentificare — CMS Demo</title>
</head>
<body>
    <h2>Autentificare</h2>
    {% if eroare %}
        <p style="color:red;">{{ eroare }}</p>
    {% endif %}
    <form method="post">
        {% csrf_token %}
        <label>Username: <input type="text" name="username" required></label><br>
        <label>Parolă: <input type="password" name="password" required></label><br>
        <button type="submit">Intră</button>
    </form>
</body>
</html>
